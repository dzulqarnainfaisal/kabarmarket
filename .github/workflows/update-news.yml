# Otomatisasi berita Kabar Market
# Tiap 15 menit: ambil berita (RSS) + harga pasar + RSS feed,
# lalu PUBLIKASIKAN otomatis ke Cloudflare Pages (project: kabarmarket).

name: Update Berita Otomatis

on:
  schedule:
    - cron: '*/15 * * * *'   # setiap 15 menit (waktu UTC)
  workflow_dispatch:      # bisa juga dijalankan manual dari tab Actions

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode
        uses: actions/checkout@v4

      - name: Siapkan Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ambil berita terbaru (RSS media Indonesia, tanpa API key)
        run: node automation/fetch-news.js

      - name: Ambil harga pasar terbaru
        run: node automation/fetch-prices.js

      - name: Buat RSS feed newsletter
        run: node automation/generate-feed.js

      - name: Simpan perubahan ke GitHub
        run: |
          git config user.name "kabar-market-bot"
          git config user.email "bot@users.noreply.github.com"
          git add news.json prices.json feed.xml sitemap.xml
          git diff --staged --quiet || git commit -m "chore: perbarui berita & harga otomatis"
          git push

      - name: Siapkan folder untuk publikasi (hanya file website)
        run: |
          mkdir -p dist
          cp index.html berita.html ekonomi.html saham.html crypto.html edukasi.html tentang.html dukung.html 404.html favicon_km.png logo-km.png og-image.png og-berita.png og-ekonomi.png og-saham.png og-crypto.png og-edukasi.png sitemap.xml robots.txt feed.xml news.json prices.json edu.json dist/
          cp -r assets dist/

      - name: Publikasikan ke Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=kabarmarket --branch=main --commit-dirty=true
